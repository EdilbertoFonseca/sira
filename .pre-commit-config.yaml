# Based on NVDA repository configuration
# https://pre-commit.ci/

ci:
  # Pyright does not run reliably in pre-commit.ci
  skip: [pyright]
  autoupdate_schedule: monthly
  autoupdate_commit_msg: "Pre-commit auto-update"
  autofix_commit_msg: "Pre-commit auto-fix"
  submodules: true

default_language_version:
  python: python3.13

repos:

# ------------------------------------------------------------
# Meta checks
# ------------------------------------------------------------
- repo: meta
  hooks:
    - id: check-useless-excludes
    - id: check-hooks-apply


# ------------------------------------------------------------
# Core pre-commit hooks
# ------------------------------------------------------------
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v5.0.0
  hooks:
    - id: no-commit-to-branch
      args: ["--branch", "main", "--branch", "master"]

    - id: check-added-large-files
    - id: check-ast
    - id: check-case-conflict
    - id: check-merge-conflict
    - id: debug-statements

    - id: trailing-whitespace
      types_or: [python, c, c++, batch, markdown, toml, yaml, powershell]

    - id: end-of-file-fixer
      types_or: [python, c, c++, batch, markdown, toml, yaml, powershell]

    - id: fix-byte-order-marker
      types_or: [python, c, c++, batch, markdown, toml, yaml, powershell]

    - id: check-toml
    - id: check-yaml
    - id: check-vcs-permalinks
    - id: check-illegal-windows-names


# ------------------------------------------------------------
# Trailing comma helper (works well with Ruff)
# ------------------------------------------------------------
- repo: https://github.com/asottile/add-trailing-comma
  rev: v3.2.0
  hooks:
    - id: add-trailing-comma


# ------------------------------------------------------------
# Ruff (lint + format)
# ------------------------------------------------------------
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.12.7
  hooks:
    - id: ruff
      name: lint with ruff
      args: [--fix]

    - id: ruff-format
      name: format with ruff


# ------------------------------------------------------------
# Pyright (local, fast execution)
# ------------------------------------------------------------
- repo: local
  hooks:
    - id: pyright
      name: type check with pyright
      entry: pyright
      language: system
      types: [python]
